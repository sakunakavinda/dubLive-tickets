<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - dubLive Tickets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
:root {
  --color-background: #0a0a0a;
  --color-text-main: #f0f0f0;
  --color-text-muted: #c0c0c0;
  --color-accent-primary: #1DC7A5;
  --color-card: #111;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { min-height: 100vh; background-color: var(--color-background); color: var(--color-text-main); display: flex; justify-content: center; align-items: center; }
.login-container {
  background: var(--color-card);
  padding: 40px;
  border-radius: 14px;
  box-shadow: 0 2px 25px rgba(0, 0, 0, 0.5);
  width: 380px;
  text-align: center;
  border: 1px solid #222;
  position: relative;
}
.home-icon {
  position: absolute;
  top: 15px;
  left: 15px;
  font-size: 1.2rem;
  color: #666;
  cursor: pointer;
  transition: all 0.3s ease;
}
.home-icon:hover { color: var(--color-accent-primary); }
.login-container h2 { margin-bottom: 30px; color: var(--color-text-main); font-size: 1.5rem; font-weight: 600; }
.login-container input {
  width: 100%;
  padding: 14px 18px;
  margin: 10px 0;
  border: 1px solid #333;
  border-radius: 10px;
  outline: none;
  font-size: 0.95rem;
  background: #1a1a1a;
  color: var(--color-text-main);
  transition: all 0.3s ease;
}
.login-container input:focus { border-color: var(--color-accent-primary); box-shadow: 0 0 0 3px rgba(29, 199, 165, 0.15); }
.login-container input::placeholder { color: #666; }
.login-container button {
  width: 100%;
  padding: 14px;
  background: var(--color-accent-primary);
  color: var(--color-background);
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 15px;
}
.login-container button:hover { background: #17a88a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(29, 199, 165, 0.3); }
.register-link { display: block; margin-top: 20px; font-size: 0.9rem; color: var(--color-accent-primary); text-decoration: none; transition: all 0.3s ease; }
.register-link:hover { color: #17a88a; text-decoration: underline; }
#error { margin-top: 15px; font-size: 0.85rem; color: #ff5b5b; }
@media (max-width: 480px) { .login-container { width: 90%; padding: 30px 25px; } }
</style>
<script type="module" src="auth.js" defer></script>
</head>
<body>
  <div class="login-container">
    <span class="home-icon" id="homeBtn"><i class="fas fa-arrow-left"></i></span>
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="error"></p>
  </div>

  <script>
    document.getElementById("homeBtn").addEventListener("click", () => {
      window.location.replace("index.html");
    });
  </script>
</body>
</html>
