<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Data - dubLive Tickets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
html, body { height: 100%; overflow-x: hidden; }
:root {
  --color-background: #0a0a0a;
  --color-text-main: #f0f0f0;
  --color-text-muted: #c0c0c0;
  --color-accent-primary: #1DC7A5;
  --color-sidebar: #111;
  --color-card: #111;
}
body { min-height: 100vh; background-color: var(--color-background); color: var(--color-text-main); display: flex; }
.sidebar { width: 280px; background: var(--color-sidebar); padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; position: fixed; height: 100vh; left: 0; top: 0; z-index: 100; border-right: 1px solid #222; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sidebar h2 { margin-bottom: 30px; color: var(--color-text-main); font-size: 1.4rem; text-align: center; padding-bottom: 20px; border-bottom: 2px solid #222; }
.sidebar h2 i { color: var(--color-accent-primary); margin-right: 10px; }
.action-button { display: flex; align-items: center; justify-content: flex-start; width: 100%; padding: 14px 20px; margin-bottom: 12px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; gap: 12px; background: #282828; color: var(--color-text-main); }
.action-button i { font-size: 1.2rem; width: 24px; text-align: center; color: var(--color-accent-primary); }
.action-button:hover, .action-button.active { background: var(--color-accent-primary); color: var(--color-background); transform: translateX(5px); }
.action-button:hover i, .action-button.active i { color: var(--color-background); }

.sidebar-footer { margin-top: auto; padding: 15px 20px; text-align: center; font-size: 0.75rem; color: #666; border-top: 1px solid #222; }
.sidebar-footer .version { color: #1dc79fcc; font-weight: bold; }
.main-content { flex: 1; margin-left: 280px; padding: 40px; }
.page-header { margin-bottom: 30px; }
.page-header h1 { color: var(--color-text-main); font-size: 1.8rem; margin-bottom: 8px; }
.page-header p { color: var(--color-text-muted); font-size: 0.95rem; }

/* Event Title Box */
.event-title-box { background: linear-gradient(135deg, var(--color-card) 0%, #1a1a1a 100%); padding: 25px 30px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; text-align: center; position: relative; overflow: hidden; }
.event-title-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--color-accent-primary), #57ff8f); }
#eventTitle { color: var(--color-text-main); font-size: 1.8rem; font-weight: 700; margin: 0; position: relative; z-index: 1; }

/* Sections */
.section { background: var(--color-card); border-radius: 12px; padding: 25px; margin-bottom: 25px; border: 1px solid #222; }
.section h2 { color: var(--color-text-main); font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section h2 i { color: var(--color-accent-primary); }

/* Flyer & Map Container */
.flyer-map-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-bottom: 25px; }
.flyer-container, .map-container { background: var(--color-card); border-radius: 12px; padding: 25px; border: 1px solid #222; display: flex; flex-direction: column; }
.flyer-container h2, .map-container h2 { color: var(--color-text-main); font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.flyer-container h2 i, .map-container h2 i { color: var(--color-accent-primary); }
.event-flyer-image, .event-map-image { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #222; display: block; margin: 0 auto; object-fit: contain; }
.placeholder-text { color: var(--color-text-muted); text-align: center; padding: 40px; font-size: 0.95rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.placeholder-text i { font-size: 2.5rem; opacity: 0.4; }
.action-row { display: flex; gap: 12px; margin-top: auto; pt: 20px; flex-wrap: wrap; }
.action-row input[type="file"] { display: none; }
.action-row label, .action-row button { padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 0.85rem; border: none; flex: 1; text-align: center; min-width: 120px; }
.action-row label { background: linear-gradient(135deg, var(--color-accent-primary), #57ff8f); color: var(--color-background); }
.action-row label:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(29,199,165,0.4); }
.action-row button.delete { background: rgba(220,53,69,0.2); color: #dc3545; }
.action-row button.delete:hover { background: #dc3545; color: white; transform: translateY(-2px); }

/* Metadata */
.metadata { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
.metadata-item { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #222; }
.metadata dt { font-weight: 600; color: var(--color-accent-primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.metadata dd { margin: 0; color: var(--color-text-main); font-size: 0.95rem; }
.metadata a { color: var(--color-accent-primary); text-decoration: none; transition: color 0.2s; }
.metadata a:hover { color: #57ff8f; }

/* Description */
.description-block { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #222; }
.description-block h3 { color: var(--color-text-main); margin: 0 0 15px 0; font-size: 1.1rem; }
.description-block p { color: var(--color-text-muted); line-height: 1.7; margin: 0; white-space: pre-wrap; }

/* Table */
.table-container { overflow-x: auto; overflow-y: hidden; background: #1a1a1a; border-radius: 8px; border: 1px solid #222; -webkit-overflow-scrolling: touch; }
.table-container::-webkit-scrollbar { height: 8px; }
.table-container::-webkit-scrollbar-track { background: #1a1a1a; }
.table-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; min-width: auto; }
thead { background: #222; }
th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; }
th { font-weight: 600; color: var(--color-accent-primary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
tbody tr:hover { background: #252525; }
tbody tr:last-child td { border-bottom: none; }

/* Sponsor Manager */
.sponsor-manager { background: var(--color-card); border-radius: 12px; padding: 25px; margin-bottom: 25px; border: 1px solid #222; }
.sponsor-manager h2 { color: var(--color-text-main); font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.sponsor-manager h2 i { color: var(--color-accent-primary); }
.sponsor-ad-box { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #222; }
.sponsor-ad-box h3 { color: var(--color-text-main); font-size: 1rem; margin: 0 0 15px 0; }
.sponsor-ad-box img { max-width: 100%; height: auto; border-radius: 6px; border: 1px solid #333; display: block; margin-bottom: 15px; }
.sub-sponsor-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
.sub-sponsor-item { background: #1a1a1a; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #222; }
.sub-sponsor-item img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 10px; border-radius: 4px; }
.sub-sponsor-item button { background: rgba(220,53,69,0.2); color: #dc3545; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: all 0.2s; width: 100%; }
.sub-sponsor-item button:hover { background: #dc3545; color: white; }

/* Delete Button */
.delete-event-btn { background: rgba(220,53,69,0.2); color: #dc3545; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 0.95rem; }
.delete-event-btn:hover { background: #dc3545; color: white; transform: translateY(-2px); }

/* Sidebar Toggle */
.sidebar-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 200; background: var(--color-accent-primary); color: var(--color-background); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
@media (max-width: 992px) { 
  .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; position: fixed; top: 0; bottom: 0; left: 0; height: 100dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; } 
  .sidebar.open { transform: translateX(0); } 
  .sidebar-backdrop.open { display: block; }
  .main-content { margin-left: 0; padding: 70px 15px 15px; width: 100%; max-width: 100vw; } 
  .sidebar-toggle { display: block; } 
  .event-flyer-image, .event-map-image, .sponsor-ad-box img { max-width: 100%; height: auto; }
}
@media (max-width: 768px) { 
  .metadata { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .metadata-item { padding: 12px; }
  .main-content { padding: 65px 15px 15px; }
  .flyer-container, .map-container, .section, .sponsor-manager { padding: 20px; margin-bottom: 20px; }
  .event-title-box { padding: 18px 20px; }
  #eventTitle { font-size: 1.5rem; }
  .sub-sponsor-list { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}
@media (max-width: 640px) {
  .main-content { padding: 60px 12px 12px; }
  .flyer-container, .map-container, .section, .sponsor-manager { padding: 15px; margin-bottom: 15px; }
  .event-title-box { padding: 15px; margin-bottom: 20px; }
  #eventTitle { font-size: 1.3rem; }
  .section h2, .flyer-container h2, .map-container h2, .sponsor-manager h2 { font-size: 1.1rem; margin-bottom: 15px; }
  .placeholder-text { padding: 30px 15px; }
  .action-row { flex-direction: column; gap: 10px; }
  .action-row label, .action-row button { width: 100%; padding: 12px; }
}
@media (max-width: 480px) { 
  .metadata { grid-template-columns: 1fr; gap: 10px; }
  .metadata-item { padding: 12px; }
  .page-header { margin-bottom: 20px; }
  .page-header h1 { font-size: 1.4rem; }
  th, td { padding: 10px 12px; font-size: 0.85rem; }
  .table-container { margin: 0 -5px; border-radius: 8px; }
  .sub-sponsor-list { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .sub-sponsor-item { padding: 8px; }
  .sub-sponsor-item img { height: 60px; }
  .delete-event-btn { width: 100%; padding: 12px; }
  .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; padding-bottom: 15px; }
  .action-button { padding: 12px 15px; font-size: 0.9rem; }
}
@media (max-width: 360px) {
  #eventTitle { font-size: 1.2rem; }
  .page-header h1 { font-size: 1.2rem; }
  th, td { padding: 8px 10px; font-size: 0.8rem; }
  .sub-sponsor-item img { height: 50px; }
  .action-button { padding: 10px 12px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
<div class="sidebar" id="sidebar">
  <h2><i class="fas fa-user"></i> Organizer</h2>
  <button id="backToDashboardBtn" class="action-button"><i class="fas fa-chart-line"></i> Dashboard</button>
  <button id="eventsBtn" class="action-button active"><i class="fas fa-calendar-alt"></i> Event Data</button>
  <button id="viewTicketsBtn" class="action-button"><i class="fas fa-ticket-alt"></i> Ticket Management</button>
  <button id="votingBtn" class="action-button"><i class="fas fa-vote-yea"></i> Voting Admin</button>
  <button id="profileBtn" class="action-button"><i class="fas fa-user"></i> Profile</button>
  <div id="sidebarFooter" class="sidebar-footer">Loading version...</div>
</div>

<div class="main-content">
  <div class="page-header">
    <h1>Event Overview</h1>
    <p id="adminEmail">organizer@email.com</p>
  </div>

  <div class="event-title-box">
    <h1 id="eventTitle">Event Name</h1>
  </div>
  
  <div class="flyer-map-container">
    <div class="flyer-container">
      <h2><i class="fas fa-image"></i> Official Event Flyer</h2>
      <img id="eventFlyerImage" src="" alt="Event Flyer" class="event-flyer-image" style="display:none;">
      <p id="flyerPlaceholder" class="placeholder-text"><i class="fas fa-image"></i>Flyer not available</p>
      <input type="file" id="eventFlyerFileInput" accept="image/*" style="display:none;">
      <div class="action-row">
        <label for="eventFlyerFileInput">Upload/Change Flyer</label>
        <button id="deleteEventFlyerBtn" class="delete" disabled>Remove Flyer</button>
      </div>
    </div>
    
    <div class="map-container">
      <h2><i class="fas fa-map"></i> Event Map Image</h2>
      <img id="eventMapImage" src="" alt="Event Map" class="event-map-image" style="display:none;">
      <p id="mapPlaceholder" class="placeholder-text"><i class="fas fa-map"></i>Map not available</p>
      <input type="file" id="eventMapFileInput" accept="image/*" style="display:none;">
      <div class="action-row">
        <label for="eventMapFileInput">Upload/Change Map</label>
        <button id="deleteEventMapBtn" class="delete" disabled>Remove Map</button>
      </div>
    </div>
  </div>
  
  <div class="section">
    <h2><i class="fas fa-info-circle"></i> Event Details</h2>
    <dl class="metadata" id="eventMetadata"></dl>
    
    <div class="description-block">
      <h3>Description</h3>
      <p id="eventDescription"></p>
    </div>
  </div>
  
  <div class="section">
    <h2><i class="fas fa-ticket-alt"></i> Ticket Inventory</h2>
    <div class="table-container">
      <table id="ticketTable"></table>
    </div>
  </div>
  
  <div class="sponsor-manager">
    <h2><i class="fas fa-star"></i> Sponsor Management</h2>
    
    <div class="sponsor-ad-box">
      <h3>Main Sponsor Ad (1200x400 px)</h3>
      <img id="mainSponsorImage" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI0MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEyMDAiIGhlaWdodD0iNDAwIiBmaWxsPSIjMWIxYjFiIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJQb3BwaW5zIiBmb250LXNpemU9IjI0IiBmaWxsPSIjYzBjMGMwIj5NYWluIFNwb25zb3IgQWQgKDEyMDB4NDAwKTwvdGV4dD48L3N2Zz4=" alt="Main Sponsor Ad">
      <input type="file" id="mainSponsorFileInput" accept="image/*" style="display:none;">
      <div class="action-row">
        <label for="mainSponsorFileInput">Upload New Main Ad</label>
        <button id="mainSponsorDeleteBtn" class="delete">Remove</button>
      </div>
    </div>

    <div class="sponsor-ad-box">
      <h3>Sub Sponsors (300x150 px Logos)</h3>
      <div id="subSponsorList" class="sub-sponsor-list"></div>
      <input type="file" id="subSponsorFileInput" accept="image/*" multiple style="display:none;">
      <div class="action-row" style="margin-top: 15px;">
        <label for="subSponsorFileInput">Add New Sub Sponsors</label>
      </div>
    </div>
  </div>
  
  <button id="deleteEventBtn" class="delete-event-btn">Delete Event</button>
</div>

<script type="module">
import { getFirestore, doc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import { auth, db } from "./auth.js";

const params = new URLSearchParams(window.location.search);
const eventId = params.get("id");

const eventTitle = document.getElementById("eventTitle");
const eventMetadata = document.getElementById("eventMetadata");
const eventDescription = document.getElementById("eventDescription"); 
const ticketTable = document.getElementById("ticketTable");
const deleteBtn = document.getElementById("deleteEventBtn");

const eventFlyerImage = document.getElementById("eventFlyerImage");
const flyerPlaceholder = document.getElementById("flyerPlaceholder");
const eventFlyerFileInput = document.getElementById("eventFlyerFileInput");
const deleteEventFlyerBtn = document.getElementById("deleteEventFlyerBtn");

const eventMapImage = document.getElementById("eventMapImage");
const mapPlaceholder = document.getElementById("mapPlaceholder");
const eventMapFileInput = document.getElementById("eventMapFileInput");
const deleteEventMapBtn = document.getElementById("deleteEventMapBtn");

const mainSponsorImage = document.getElementById("mainSponsorImage");
const mainSponsorFileInput = document.getElementById("mainSponsorFileInput");
const mainSponsorDeleteBtn = document.getElementById("mainSponsorDeleteBtn");
const subSponsorList = document.getElementById("subSponsorList");
const subSponsorFileInput = document.getElementById("subSponsorFileInput");
const sidebar = document.getElementById("sidebar");
const sidebarToggle = document.getElementById("sidebarToggle");
const sidebarBackdrop = document.getElementById("sidebarBackdrop");

let currentEventData = null;

// Fix sidebar height for mobile browsers
function fixSidebarHeight() {
  if (window.innerWidth <= 992) {
    // Use window.innerHeight directly for mobile
    sidebar.style.height = window.innerHeight + 'px';
  } else {
    sidebar.style.height = '100vh';
  }
}

// Set sidebar height on load and resize
fixSidebarHeight();
window.addEventListener('resize', fixSidebarHeight);
window.addEventListener('orientationchange', () => {
  setTimeout(fixSidebarHeight, 100);
});

sidebarToggle.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  sidebarBackdrop.classList.toggle("open");
});
sidebarBackdrop.addEventListener("click", () => {
  sidebar.classList.remove("open");
  sidebarBackdrop.classList.remove("open");
});
document.addEventListener("click", (e) => {
  if (window.innerWidth <= 992 && !sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
    sidebar.classList.remove("open");
    sidebarBackdrop.classList.remove("open");
  }
});

function formatDate(dateString) {
    if (!dateString) return 'TBA';
    try {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(dateString).toLocaleDateString('en-US', options);
    } catch {
        return dateString;
    }
}

function generateUniqueId(prefix) {
    return prefix + Date.now().toString(36) + Math.random().toString(36).substring(2, 5);
}

async function uploadFlyerImage(file) { 
    const formData = new FormData();
    formData.append("eventFlyerImage", file);
    formData.append("eventId", eventId); 
    const eventName = currentEventData && currentEventData.title ? currentEventData.title.trim() : eventId; 
    formData.append("eventName", eventName); 
    if (currentEventData && currentEventData.flyerUrl) {
        formData.append("oldFilePath", currentEventData.flyerUrl);
    }
    try {
        const response = await fetch(`/upload-event-flyer`, { method: 'POST', body: formData });
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error ${response.status}`);
        }
        const result = await response.json();
        return result.filePath; 
    } catch (error) {
        console.error("Flyer upload failed:", error);
        alert(`Error uploading event flyer: ${error.message}`);
        throw error;
    }
}

async function deleteFlyerFileFromServer(filePath) {
    if (!filePath) return;
    try {
        const response = await fetch(`/delete-event-flyer`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filePath: filePath }) });
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error ${response.status}`);
        }
    } catch (error) {
        console.error("Error deleting flyer file from server:", error);
        throw error;
    }
}

async function updateFlyerUrlInFirestore(flyerUrl) {
    const eventDocRef = doc(db, "events", eventId);
    try {
        await updateDoc(eventDocRef, { flyerUrl: flyerUrl || null });
        alert(`Event flyer URL updated successfully.`);
        await loadEventDetails(eventId);
    } catch (error) {
        console.error("Firestore flyer update failed:", error);
        alert(`Error saving flyer URL: ${error.message}`);
    }
}

eventFlyerFileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!currentEventData) {
        alert("Error: Event data not loaded. Cannot upload flyer.");
        return;
    }
    try {
        eventFlyerImage.style.opacity = '0.5';
        const filePath = await uploadFlyerImage(file);
        await updateFlyerUrlInFirestore(filePath);
    } finally {
        eventFlyerImage.style.opacity = '1';
    }
};

deleteEventFlyerBtn.onclick = async () => {
    if (!currentEventData) return;
    if (confirm("Are you sure you want to remove the Event Flyer?")) {
        const flyerUrl = currentEventData.flyerUrl;
        if (flyerUrl) {
            try {
                await deleteFlyerFileFromServer(flyerUrl);
            } catch (e) {
                alert("Warning: Failed to delete file from server. " + e.message);
                if (!confirm("Do you want to force remove the reference from the database?")) return;
            }
        }
        await updateFlyerUrlInFirestore(null);
    }
};

async function uploadSponsorImage(file, type) { 
    const formData = new FormData();
    formData.append("sponsorImage", file);
    const eventName = currentEventData && currentEventData.title ? currentEventData.title.trim() : eventId; 
    formData.append("eventName", eventName);
    if (eventId) formData.append("eventId", eventId);
    if (type === 'main' && currentEventData && currentEventData.sponsorData && currentEventData.sponsorData.main && currentEventData.sponsorData.main.imageUrl) {
        formData.append("oldFilePath", currentEventData.sponsorData.main.imageUrl);
    }
    try {
        const response = await fetch(`/upload-sponsor-ad/${type}`, { method: 'POST', body: formData });
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error ${response.status}`);
        }
        const result = await response.json();
        return result.filePath; 
    } catch (error) {
        console.error(`Sponsor ${type} upload failed:`, error);
        alert(`Error uploading ${type} sponsor ad: ${error.message}`);
        throw error;
    }
}

async function deleteSponsorFileFromServer(filePath, type) {
    if (!filePath || filePath.includes('default-sponsor')) return;
    try {
        const response = await fetch(`/delete-sponsor-ad/${type}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filePath: filePath }) });
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error ${response.status}`);
        }
    } catch (error) {
        console.error(`Error deleting ${type} sponsor file from server:`, error);
        throw error;
    }
}

async function updateSponsorDataInFirestore(type, newData, subId) {
    const eventDocRef = doc(db, "events", eventId);
    let updateData = {};
    let newSponsorData = currentEventData.sponsorData || { main: {}, sub: [] };
    if (type === 'main') {
        newSponsorData.main = newData || {};
    } else if (type === 'sub') {
        if (!newData) {
            newSponsorData.sub = newSponsorData.sub.filter(s => s.id !== subId);
        } else {
            newSponsorData.sub.push(newData);
        }
    }
    updateData.sponsorData = newSponsorData;
    try {
        await updateDoc(eventDocRef, updateData);
        alert(`${type === 'main' ? 'Main Sponsor' : 'Sub Sponsors'} updated successfully.`);
        await loadEventDetails(eventId);
    } catch (error) {
        console.error("Firestore update failed:", error);
        alert(`Error saving sponsor data: ${error.message}`);
    }
}

mainSponsorFileInput.onchange = async (e) => {

        mainSponsorImage.style.opacity = '0.5';

mainSponsorDeleteBtn.onclick = async () => {

subSponsorFileInput.onchange = async (e) => {
    const files = e.target.files;
    if (files.length === 0) return;
    for (const file of files) {
        const id = generateUniqueId('sub');
        try {
            const filePath = await uploadSponsorImage(file, 'sub');
            const newSubSponsor = { id: id, imageUrl: filePath, linkUrl: '#' };
            await updateSponsorDataInFirestore('sub', newSubSponsor);
        } catch (error) {
            console.error(`Failed to process file ${file.name}:`, error);
        }
    }
};

function renderSubSponsors(subSponsors) {
    subSponsorList.innerHTML = '';
    if (!subSponsors || subSponsors.length === 0) {
        subSponsorList.innerHTML = '<p style="color:#777; font-size:0.9rem;">No sub sponsors added yet.</p>';
        return;
    }
    subSponsors.forEach(sponsor => {
        const item = document.createElement('div');
        item.className = 'sub-sponsor-item';
        item.dataset.id = sponsor.id;
        const img = document.createElement('img');
        img.src = sponsor.imageUrl || 'images/default-sponsor-sub.png';
        const removeBtn = document.createElement('button');
        removeBtn.textContent = 'Remove';
        removeBtn.onclick = () => removeSubSponsor(sponsor.id);
        item.append(img, removeBtn);
        subSponsorList.appendChild(item);
    });
}

async function removeSubSponsor(subId) {
    if (confirm("Are you sure you want to remove this sub sponsor logo?")) {
        const subSponsors = currentEventData.sponsorData?.sub || [];
        const sponsorToRemove = subSponsors.find(s => s.id === subId);
        if (sponsorToRemove && sponsorToRemove.imageUrl) {
            try {
                await deleteSponsorFileFromServer(sponsorToRemove.imageUrl, 'sub');
            } catch (e) {
                 alert("Warning: Failed to delete file from server. " + e.message);
                 if (!confirm("Do you want to force remove the reference from the database?")) return;
            }
        }
        await updateSponsorDataInFirestore('sub', null, subId);
    }
}

async function uploadMapImage(file) { 
    const formData = new FormData();
    formData.append("eventMapImage", file);
    formData.append("eventId", eventId); 
    const eventName = currentEventData && currentEventData.title ? currentEventData.title.trim() : eventId; 
    formData.append("eventName", eventName); 
    if (currentEventData && currentEventData.mapUrl) {
        formData.append("oldFilePath", currentEventData.mapUrl);
    }
    try {
        const response = await fetch(`/upload-event-map`, { method: 'POST', body: formData });
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error ${response.status}`);
        }
        const result = await response.json();
        return result.filePath; 
    } catch (error) {
        console.error("Map upload failed:", error);
        alert(`Error uploading event map: ${error.message}`);
        throw error;
    }
}

async function deleteMapFileFromServer(filePath) {
    if (!filePath) return;
    try {
        const response = await fetch(`/delete-event-map`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filePath: filePath }) });
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error ${response.status}`);
        }
    } catch (error) {
        console.error("Error deleting map file from server:", error);
        throw error;
    }
}

async function updateMapUrlInFirestore(mapUrl) {
    const eventDocRef = doc(db, "events", eventId);

        alert(`Error saving map URL: ${error.message}`);

}

async function loadEventDetails(id) {
    if (!id) {
        alert("Event ID is missing!");
        window.location.href = "organizer-dashboard.html";
        return;
    }
    const eventDocRef = doc(db, "events", id);
    const docSnap = await getDoc(eventDocRef);
    if (!docSnap.exists()) {
        alert("Event not found!");
        window.location.href = "organizer-dashboard.html";
        return;
    }
    const event = docSnap.data();
    currentEventData = event; 
    eventTitle.textContent = event.title;
    eventMetadata.innerHTML = `
        <dt>Date</dt><dd>${formatDate(event.date)}</dd>
        <dt>Time</dt><dd>${event.time || 'TBA'}</dd>
        <dt>Venue</dt><dd>${event.venue || 'TBA'}</dd>
        <dt>Category</dt><dd>${event.category || 'Not specified'}</dd>
        <dt>Organizer</dt><dd>${event.organizer || 'TBA'}</dd>
        <dt>Contact</dt><dd><a href="${event.contact}" target="_blank">WhatsApp Link</a></dd>
    `;
    const descriptionText = (event.description || 'No detailed description provided.').replace(/\n/g, '<br>');
    eventDescription.innerHTML = descriptionText;
    
    const flyerUrl = event.flyerUrl; 
    if (flyerUrl) {
        eventFlyerImage.src = flyerUrl;
        eventFlyerImage.style.display = 'block';
        flyerPlaceholder.style.display = 'none';
        deleteEventFlyerBtn.disabled = false;
    } else {
        eventFlyerImage.style.display = 'none';
        flyerPlaceholder.style.display = 'block';
        deleteEventFlyerBtn.disabled = true;
    }
    
    const mapUrl = event.mapUrl;
    if (mapUrl) {
        eventMapImage.src = mapUrl;
        eventMapImage.style.display = 'block';
        mapPlaceholder.style.display = 'none';
        deleteEventMapBtn.disabled = false;
    } else {
        eventMapImage.style.display = 'none';
        mapPlaceholder.style.display = 'block';
        deleteEventMapBtn.disabled = true;
    }

    const ticketTypes = event.ticketTypes || [];
    const headerLabels = ["Ticket Type", "Price (LKR)", "Quantity", "Issued", "Remaining"];
    let html = `<thead><tr><th>Ticket Type</th><th>Price (LKR)</th><th>Quantity</th><th>Issued</th><th>Remaining</th></tr></thead><tbody>`;
    
    const rows = [];
    const tickets = Array.isArray(ticketTypes) ? ticketTypes : Object.values(ticketTypes || {});
    
    tickets.forEach(data => {
        const totalQuantity = data.quantity || 0;
        const price = data.price || 0;
        const issued = data.issuedTickets || 0;
        const remaining = totalQuantity - issued;
        
        const cellData = [
            data.name,
            price.toLocaleString(),
            totalQuantity.toLocaleString(),
            issued.toLocaleString(),
            remaining.toLocaleString()
        ];

        let rowHtml = `<tr>`;
        cellData.forEach((content, index) => {
            rowHtml += `<td data-label="${headerLabels[index]}">${content}</td>`;
        });
        rowHtml += `</tr>`;
        rows.push(rowHtml);
    });
    
    html += rows.join('');
    html += "</tbody>";
    ticketTable.innerHTML = html;
    
    const sponsorData = event.sponsorData || { main: {}, sub: [] };
    const mainSponsorUrl = sponsorData.main.imageUrl;
    
    if (mainSponsorUrl && !mainSponsorUrl.includes('default-sponsor-main.png')) {
        mainSponsorImage.src = mainSponsorUrl;
        mainSponsorImage.style.display = 'block';
    } else {
        mainSponsorImage.src = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI0MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEyMDAiIGhlaWdodD0iNDAwIiBmaWxsPSIjMWIxYjFiIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJQb3BwaW5zIiBmb250LXNpemU9IjI0IiBmaWxsPSIjYzBjMGMwIj5NYWluIFNwb25zb3IgQWQgKDEyMDB4NDAwKTwvdGV4dD48L3N2Zz4=";
        mainSponsorImage.style.display = 'none';
    }
    
    renderSubSponsors(sponsorData.sub);

    deleteBtn.onclick = async () => {
        if (!currentEventData) {
            alert("Error: Event data not loaded. Please refresh the page.");
            return;
        }
        if (!confirm(`Are you sure you want to permanently delete the event "${currentEventData.title}"?`)) return;
        try {
            const eventDocRef = doc(db, "events", id);
            await deleteDoc(eventDocRef);
            alert("Event deleted successfully!");
            window.location.href = "organizer-dashboard.html";
        } catch (error) {
            alert("A critical error occurred during event deletion: " + error.message);
        }
    };
}
